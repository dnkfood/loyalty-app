apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty-bff
  namespace: loyalty
  labels:
    app: loyalty-bff
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: loyalty-bff
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: loyalty-bff
    spec:
      containers:
        - name: bff
          image: loyalty-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: loyalty-secrets
                  key: redis-url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: loyalty-secrets
                  key: jwt-access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: loyalty-secrets
                  key: jwt-refresh-secret
            - name: LOYALTY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: loyalty-secrets
                  key: webhook-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
