services:
  - type: web
    name: loyalty-bff
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: |
      npm install -g pnpm@9.0.0 &&
      pnpm install --frozen-lockfile --ignore-scripts &&
      pnpm --filter @loyalty/shared-types build &&
      pnpm --filter @loyalty/shared-utils build &&
      pnpm --filter bff exec prisma generate --schema=prisma/schema.prisma &&
      pnpm --filter bff build
    startCommand: |
      cd apps/bff && npx prisma migrate deploy && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: API_PREFIX
        value: api/v1
      - key: CORS_ORIGINS
        value: "https://loyalty-admin.onrender.com,https://admin.yourdomain.com"
      - key: DATABASE_URL
        fromDatabase:
          name: loyalty-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: loyalty-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: "900"
      - key: JWT_REFRESH_TTL
        value: "2592000"
      - key: SMS_PRIMARY_PROVIDER
        value: alfa
      - key: BEELINE_SMS_API_URL
        value: ""
      - key: BEELINE_SMS_API_KEY
        value: ""
      - key: ALFA_SMS_API_URL
        value: "http://api.alfasms.info"
      - key: ALFA_SMS_API_KEY
        value: ""
      - key: ALFA_SMS_LOGIN
        value: ""
      - key: ALFA_SMS_PASSWORD
        value: ""
      - key: FCM_SERVER_KEY
        value: ""
      - key: APNS_KEY_ID
        value: ""
      - key: APNS_TEAM_ID
        value: ""
      - key: APNS_BUNDLE_ID
        value: com.loyalty.app
      - key: APNS_KEY_PATH
        value: ""
      - key: LOYALTY_SYSTEM_API_URL
        value: "http://45.84.87.169:5100"
      - key: LOYALTY_SYSTEM_API_KEY
        value: ""
      - key: LOYALTY_WEBHOOK_SECRET
        generateValue: true
      - key: RATE_LIMIT_OTP_SEND_MAX
        value: "3"
      - key: RATE_LIMIT_OTP_SEND_WINDOW
        value: "600"
      - key: RATE_LIMIT_OTP_VERIFY_MAX
        value: "5"
      - key: RATE_LIMIT_OTP_VERIFY_WINDOW
        value: "600"
      - key: PUSH_MAX_PER_USER_PER_DAY
        value: "3"

databases:
  - name: loyalty-db
    plan: free
    region: frankfurt
    databaseName: loyalty_db
    user: loyalty

redis:
  - name: loyalty-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
